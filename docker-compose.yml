version: '3.8'

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/maintainiq
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_string_before_deploying}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

volumes:
  mongo_data:
