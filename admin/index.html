  <script>
    // ── AUTH GUARD: Redirect to login if no valid session ──────────────────
    (function() {
      const saved = localStorage.getItem('maintainiq_auth');
      if (!saved) { window.location.replace('../auth.html'); return; }
      try {
        const { token, user } = JSON.parse(saved);
        if (!token || !user) { window.location.replace('../auth.html'); return; }
        // Expose globally for React App to consume
        window.__AUTH_USER__  = user;
        window.__AUTH_TOKEN__ = token;
        // Pre-set role in localStorage so App uses it
        localStorage.setItem('maintainiq_active_role', user.role);
      } catch {
        localStorage.removeItem('maintainiq_auth');
        window.location.replace('../auth.html');
      }
    })();
  </script>

    // 4. Issues Page
    function IssuesPage({ issues, setIssues, assets, setAssets, users, searchQuery, activeRole, addSystemLog }) {
      const [inspectingTicket, setInspectingTicket] = useState(null);
      const [assignedTech, setAssignedTech] = useState('');
      const [ticketStatus, setTicketStatus] = useState('');
      const [editTitle, setEditTitle] = useState('');
      const [editCategory, setEditCategory] = useState('');
      const [editPriority, setEditPriority] = useState('');

      const handleSaveTriageReview = (e) => {
        e.preventDefault();
        setIssues(prev => prev.map(i => {
          if(i.id === inspectingTicket.id) {
            const updated = {
              ...i,
              title: editTitle,
              category: editCategory,
              priority: editPriority,
              status: ticketStatus,
              technician_id: assignedTech ? (isNaN(Number(assignedTech)) ? assignedTech : Number(assignedTech)) : null,
              updated_at: new Date().toISOString()
            };
            if(updated.status === 'Reported' && updated.technician_id) {
              updated.status = 'Assigned';
            }
            return updated;
          }
          return i;
        }));

        const linkAsset = assets.find(a => String(a.id) === String(inspectingTicket.asset_id));
        if (linkAsset) {
          let nextAssetStatus = linkAsset.status;
          if(ticketStatus === 'Inspection Started') nextAssetStatus = 'Under Inspection';
          else if(ticketStatus === 'Maintenance In Progress') nextAssetStatus = 'Under Maintenance';
          else if(ticketStatus === 'Resolved') nextAssetStatus = 'Operational';
          else if(ticketStatus === 'Reopened') nextAssetStatus = 'Issue Reported';

          setAssets(prev => prev.map(a => {
            if(String(a.id) === String(linkAsset.id)) {
              return { ...a, status: nextAssetStatus };
            }
            return a;
          }));

          addSystemLog(linkAsset.id, activeRole, 'Issue Status Changed', `Issue ticket ${inspectingTicket.issue_number} set to ${ticketStatus}. Asset is now ${nextAssetStatus}.`);
        }

        setInspectingTicket(null);
        notify('Triage record saved successfully!', 'success');
      };

      const openTriageReview = (ticket) => {
        setInspectingTicket(ticket);
        setAssignedTech(ticket.technician_id || '');
        setTicketStatus(ticket.status);
        setEditTitle(ticket.ai_suggested_title || ticket.title);
        setEditCategory(ticket.ai_suggested_category || ticket.category);
        setEditPriority(ticket.ai_suggested_priority || ticket.priority);
      };

      const filtered = issues.filter(i =>
        i.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        i.issue_number.toLowerCase().includes(searchQuery.toLowerCase())
      );

      return (
        <div class="space-y-6">
          <div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Maintenance Issues Desk</h2>
            <p class="text-xs text-indigo-400/70 mt-1">Review reported problems, review AI Triages, and assign tasks to technicians.</p>
          </div>

          <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-6 glass-panel shadow-xl shadow-[#03050a]/40">
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="border-b border-indigo-500/10">
                    <th class="pb-3 text-[10px] font-bold text-indigo-400/50 uppercase tracking-widest">Ticket ID</th>
                    <th class="pb-3 text-[10px] font-bold text-indigo-400/50 uppercase tracking-widest">Issue Reported</th>
                    <th class="pb-3 text-[10px] font-bold text-indigo-400/50 uppercase tracking-widest">Priority</th>
                    <th class="pb-3 text-[10px] font-bold text-indigo-400/50 uppercase tracking-widest">Category</th>
                    <th class="pb-3 text-[10px] font-bold text-indigo-400/50 uppercase tracking-widest">Assigned Tech</th>
                    <th class="pb-3 text-[10px] font-bold text-indigo-400/50 uppercase tracking-widest">Status</th>
                    <th class="pb-3 text-[10px] font-bold text-indigo-400/50 uppercase tracking-widest text-right">Actions</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-indigo-500/10 text-xs text-slate-350">
                  {filtered.map(i => {
                    const tech = users.find(u => String(u.id) === String(i.technician_id));
                    return (
                      <tr key={i.id} class="hover:bg-indigo-500/5 transition-colors">
                        <td class="py-4 font-mono font-bold text-indigo-450">{i.issue_number}</td>
                        <td class="py-4">
                          <div class="font-bold text-white">{i.title}</div>
                          <div class="text-[10px] text-indigo-400/40 mt-0.5">Reporter: {i.reporter_name}</div>
                        </td>
                        <td class="py-4">
                          <span class={`px-2.5 py-0.5 rounded text-[10px] font-bold ${
                            i.priority === 'Critical' ? 'bg-red-950/40 border border-red-500/20 text-red-400' :
                            i.priority === 'High' ? 'bg-amber-950/40 border border-amber-500/20 text-amber-400' :
                            'bg-indigo-950/40 border border-indigo-500/20 text-indigo-400'
                          }`}>{i.priority}</span>
                        </td>
                        <td class="py-4 text-slate-300 font-medium">{i.category}</td>
                        <td class="py-4 text-slate-300 font-medium">
                          {tech ? tech.username : <span class="text-slate-500 font-bold">Unassigned</span>}
                        </td>
                        <td class="py-4">
                          <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-indigo-950/50 text-indigo-450 border border-indigo-900/40">
                            {i.status}
                          </span>
                        </td>
                        <td class="py-4 text-right">
                          <button onClick={() => openTriageReview(i)} class="px-3 py-1.5 bg-[#0d1326] border border-indigo-500/20 text-indigo-400 font-bold hover:bg-[#121a32] rounded-lg transition-colors shadow-md">
                            Triage & Workflow
                          </button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* EDIT WORKFLOW TICKET MODAL */}
          {inspectingTicket && (
            <div class="fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4">
              <div class="bg-[#0d1326] border border-indigo-500/15 rounded-2xl w-full max-w-2xl p-6 overflow-hidden flex flex-col max-h-[90vh] shadow-2xl shadow-[#03050a]/60">
                <h3 class="text-md font-bold text-white mb-4 font-sans">Triage & Workflow Control</h3>
                <form onSubmit={handleSaveTriageReview} class="space-y-4 overflow-y-auto pr-1">
                  {!!inspectingTicket.ai_used && (
                    <div class="p-3 bg-indigo-950/30 border border-indigo-500/20 rounded-xl text-xs space-y-1.5">
                      <div class="font-bold text-indigo-300 flex items-center gap-1.5">
                        <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> AI Suggestion — review before saving
                      </div>
                      <div class="text-slate-400">
                        Original reporter complaint: <span class="text-slate-300">{inspectingTicket.description}</span>
                      </div>
                      {(() => {
                        let causes = [], checks = [];
                        try { causes = JSON.parse(inspectingTicket.ai_possible_causes || '[]'); } catch {}
                        try { checks = JSON.parse(inspectingTicket.ai_diagnostic_checks || '[]'); } catch {}
                        return (
                          <>
                            {causes.length > 0 && <div class="text-slate-400"><b class="text-slate-300">Possible causes:</b> {causes.join(', ')}</div>}
                            {checks.length > 0 && <div class="text-slate-400"><b class="text-slate-300">Initial checks:</b> {checks.join(', ')}</div>}
                          </>
                        );
                      })()}
                      {inspectingTicket.ai_pattern_warning && (
                        <div class="text-amber-400">⚠ {inspectingTicket.ai_pattern_warning}</div>
                      )}
                      <div class="text-slate-500">The title, category, and priority fields below are pre-filled from this suggestion — edit anything before saving; the final decision is yours.</div>
                    </div>
                  )}

                  <div>
                    <label class="block text-[10px] font-bold text-indigo-400/60 uppercase mb-1">Title</label>
                    <input
                      type="text"
                      required
                      value={editTitle}
                      onChange={e => setEditTitle(e.target.value)}
                      class="w-full bg-[#060814] border border-indigo-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-indigo-500/50 focus:bg-[#090d19] transition-all"
                    />
                  </div>
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label class="block text-[10px] font-bold text-indigo-400/60 uppercase mb-1">Category</label>
                      <input
                        type="text"
                        required
                        value={editCategory}
                        onChange={e => setEditCategory(e.target.value)}

                      />
                    </div>
                    <div>
                      <label class="block text-[10px] font-bold text-indigo-400/60 uppercase mb-1">Priority</label>
                      <select

        if(!newLog.asset_id || !newLog.notes) {

          return;

        const targetAsset = assets.find(a => String(a.id) === String(newLog.asset_id));
        if(!targetAsset) return;

        const fresh = {
          id: Date.now(),
          asset_id: targetAsset.id,
          issue_id: null,
          notes: newLog.notes,
          parts_used: newLog.parts_used,
          cost: Number(newLog.cost) || 0,
          start_date: new Date().toISOString().split('T')[0],
          end_date: new Date().toISOString().split('T')[0],
          technician_name: newLog.technician_name,
          status: 'Completed'
        };

        setMaintenance(prev => [fresh, ...prev]);

        setAssets(prev => prev.map(a => {
          if(a.id === targetAsset.id) {
            const nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + 180);
            return {
              ...a,
              last_service_date: fresh.end_date,
              next_service_date: nextDate.toISOString().split('T')[0],
              status: 'Operational'

          return a;

        addSystemLog(targetAsset.id, activeRole, 'Maintenance Logged', `Maintenance logged by ${newLog.technician_name}. Cost: $${fresh.cost}.`);

    // 6. QR Batch Page
    function QrCodesPage({ assets }) {
      const [selectedBatch, setSelectedBatch] = useState([]);

      const handleToggleSelect = (id) => {
        if (selectedBatch.includes(id)) {
          setSelectedBatch(prev => prev.filter(x => x !== id));
        } else {
          setSelectedBatch(prev => [...prev, id]);
        }
      };

      const handleSelectAll = () => {
        if (selectedBatch.length === assets.length) {
          setSelectedBatch([]);
        } else {
          setSelectedBatch(assets.map(a => a.id));
        }
      };

      const handlePrintBatchSheet = () => {
        if (selectedBatch.length === 0) return;
        const win = window.open('', '_blank');
        let labelHTML = `
          <html>
            <body style="font-family:sans-serif; padding: 20px;" onload="window.print(); window.close();">
              <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap: 20px;">
        `;
        assets.filter(a => selectedBatch.includes(a.id)).forEach(a => {
          const qr = makeQRDataURL(`${window.location.origin}/public.html?code=${encodeURIComponent(a.asset_code)}`);
          labelHTML += `
            <div style="border: 2px solid #000; border-radius: 8px; padding: 15px; text-align: center;">
              <h4 style="margin:0 0 5px 0;">${a.name}</h4>
              <img src="${qr}" style="width:110px; height:110px;"/>
              <div style="font-family:monospace; font-size:11px; margin-top:5px; font-weight:bold;">${a.asset_code}</div>
            </div>
          `;
        });
        labelHTML += `</div></body></html>`;
        win.document.write(labelHTML);
        win.document.close();
      };

      return (
        <div class="space-y-6">
          <div class="flex justify-between items-center">
            <div>
              <h2 class="text-2xl font-bold text-white tracking-tight">Bulk QR Code Generator</h2>
              <p class="text-xs text-indigo-400/70 mt-1">Select assets to generate printable batch label sheets.</p>
            </div>
            <div class="flex gap-2">
              <button onClick={handleSelectAll} class="px-4 py-2 bg-[#0d1326] border border-indigo-500/20 text-indigo-400 font-bold text-xs rounded-xl hover:bg-[#121a32] transition-colors shadow-sm">
                {selectedBatch.length === assets.length ? 'Deselect All' : 'Select All'}
              </button>
              <button onClick={handlePrintBatchSheet} disabled={selectedBatch.length === 0} class="px-4 py-2 bg-indigo-600 disabled:opacity-50 text-white font-extrabold text-xs rounded-xl flex items-center gap-2 hover:bg-indigo-500 transition-colors shadow-lg shadow-indigo-600/20">
                <i data-lucide="print" class="w-4 h-4"></i> Print Selected ({selectedBatch.length})
              </button>
            </div>
          </div>

          <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-6 glass-panel shadow-xl shadow-[#03050a]/40">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
              {assets.map(a => {
                const isChecked = selectedBatch.includes(a.id);
                const qr = makeQRDataURL(`${window.location.origin}/public.html?code=${encodeURIComponent(a.asset_code)}`);
                return (
                  <div
                    key={a.id}
                    onClick={() => handleToggleSelect(a.id)}
                    class={`p-4 rounded-2xl border cursor-pointer flex flex-col items-center gap-3 transition-all relative ${
                      isChecked ? 'bg-indigo-950/50 border-indigo-500 shadow-md' : 'bg-[#060814]/40 border border-indigo-500/10 hover:border-indigo-500/30'
                    }`}
                  >
                    <div class="bg-white p-2 rounded-xl mt-3 border border-indigo-500/10 shadow-sm">
                      <img src={qr} alt="QR preview" class="w-24 h-24" />
                    </div>
                    <div class="text-center">
                      <h4 class="text-xs font-bold text-white truncate max-w-[140px]">{a.name}</h4>
                      <span class="text-[10px] font-mono text-indigo-400/40 font-bold block mt-1">{a.asset_code}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );

    // 11. Public Preview / Scanner Page
    function PublicScannerPage({ assets, setAssets, issues, setIssues, addSystemLog }) {
      const [scannedCode, setScannedCode] = useState('');
      const [complaintText, setComplaintText] = useState('');
      const [reporter, setReporter] = useState('');
      const [reporterContact, setReporterContact] = useState('');

      const handleMockScan = (e) => {
        e.preventDefault();
        if(!scannedCode) return;
        const found = assets.find(a => a.asset_code === scannedCode);
        if(!found) {
          alert('Scanned asset code not found.');
        } else {
          notify(`QR scan successful: Asset ${scannedCode} loaded!`, 'success');
        }
      };

      const handlePublicReportSubmit = (e) => {
        e.preventDefault();
        const target = assets.find(a => a.asset_code === scannedCode);
        if(!target) {
          alert('Please scan/load a valid asset code first!');
          return;
        }

        const textLower = complaintText.toLowerCase();
        let aiTitle = 'Equipment Operational Warning';
        let aiCategory = 'Mechanical';
        let aiPriority = 'Medium';
        let aiCauses = ['Gasket wear', 'Stabilizer loose'];
        let aiChecks = ['Inspect physical alignment', 'Tighten stabilizer bolts'];

        if(textLower.includes('leak') || textLower.includes('fluid') || textLower.includes('water')) {
          aiTitle = 'Fluid Leak Warning';
          aiCategory = 'Hydraulic';
          aiPriority = 'High';
          aiCauses = ['Hose connection seal fracture', 'Reservoir overfill'];
          aiChecks = ['Check line compression seals', 'Clean fluid residue'];
        } else if(textLower.includes('noise') || textLower.includes('vibrate')) {
          aiTitle = 'Vibration Warning';
          aiCategory = 'Mechanical';
          aiPriority = 'High';
          aiCauses = ['Bearing fracture', 'Rotary spindle alignment deviation'];
          aiChecks = ['Verify rotary bearing alignment'];
        }

        const ticketNum = `#REQ-${Math.floor(1000 + Math.random()*9000)}`;

        const newIssue = {
          id: Date.now(),
          issue_number: ticketNum,
          asset_id: target.id,
          title: complaintText.substring(0, 32) + '...',
          description: complaintText,
          priority: aiPriority,
          category: aiCategory,
          reporter_name: reporter || 'Public Scanner User',
          reporter_contact: reporterContact || 'N/A',
          status: 'Reported',
          evidence_url: '',
          technician_id: null,
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
          closed_at: null,
          ai_used: 1,
          ai_suggested_title: aiTitle,
          ai_suggested_category: aiCategory,
          ai_suggested_priority: aiPriority,
          ai_possible_causes: JSON.stringify(aiCauses),
          ai_diagnostic_checks: JSON.stringify(aiChecks),
          ai_pattern_warning: 'Recurring checks required.'
        };

        setIssues(prev => [newIssue, ...prev]);

        setAssets(prev => prev.map(a => {
          if(String(a.id) === String(target.id)) {
            return { ...a, status: 'Issue Reported' };
          }
          return a;
        }));

        addSystemLog(target.id, reporter || 'Public User', 'Issue Reported', `Filed issue ticket ${ticketNum} via public QR scanner page.`);
        notify(`Issue ticket ${ticketNum} filed successfully!`, 'success');
        
        setComplaintText('');
        setReporter('');
        setReporterContact('');
      };

      const activeScannedAsset = assets.find(a => a.asset_code === scannedCode);

      return (
        <div class="space-y-6 max-w-xl mx-auto">
          <div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Public QR Scanner Hub</h2>
            <p class="text-xs text-indigo-400/70 mt-1">Simulate scanning a physical QR code on an asset using a mobile phone.</p>
          </div>

          <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-6 glass-panel space-y-4 shadow-xl shadow-[#03050a]/40">
            <h4 class="text-sm font-bold text-white">Scan Device Code</h4>
            <form onSubmit={handleMockScan} class="flex gap-2">
              <select
                value={scannedCode}
                onChange={e => setScannedCode(e.target.value)}
                class="flex-1 bg-[#060814] border border-indigo-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-indigo-500/50 focus:bg-[#090d19] transition-all font-mono"
              >
                <option value="">Scan QR Code...</option>
                {assets.map(a => (
                  <option key={a.id} value={a.asset_code}>{a.asset_code} — {a.name}</option>
                ))}
              </select>
              <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold text-xs rounded-xl transition-all shadow-md shadow-indigo-600/10">
                Scan QR
              </button>
            </form>
          </div>

          {activeScannedAsset && (
            <div class="space-y-6">
              <div class="bg-[#0c1020]/80 border border-indigo-500/12 rounded-2xl p-6 glass-panel space-y-4 shadow-md">
                <div class="flex justify-between items-center">
                  <h3 class="font-bold text-white text-md">{activeScannedAsset.name}</h3>
                  <span class="text-xs font-mono font-bold bg-indigo-950/50 text-indigo-400 border border-indigo-900/40 px-2 py-0.5 rounded">
                    {activeScannedAsset.asset_code}
                  </span>
                </div>
                <div class="grid grid-cols-2 gap-4 text-xs">
                  <div>
                    <span class="block text-indigo-400/50 text-[10px] uppercase font-bold">Category</span>
                    <span class="text-white font-semibold">{activeScannedAsset.category}</span>
                  </div>
                  <div>
                    <span class="block text-indigo-400/50 text-[10px] uppercase font-bold">Location</span>
                    <span class="text-white font-semibold">{activeScannedAsset.location}</span>
                  </div>
                </div>
              </div>

              <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-6 glass-panel space-y-4 shadow-xl shadow-[#03050a]/40">
                <h4 class="text-sm font-bold text-white">Report Fault or Damage</h4>
                <form onSubmit={handlePublicReportSubmit} class="space-y-4">
                  <div>
                    <label class="block text-[10px] font-bold text-indigo-400/60 uppercase mb-1">Your Name *</label>
                    <input
                      type="text"
                      required
                      placeholder="e.g. Sarah Connor"
                      value={reporter}
                      onChange={e => setReporter(e.target.value)}
                      class="w-full bg-[#060814] border border-indigo-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-indigo-500/50 focus:bg-[#090d19] transition-all"
                    />
                  </div>
                  <div>
                    <label class="block text-[10px] font-bold text-indigo-400/60 uppercase mb-1">Complaint / Failure Description *</label>
                    <textarea
                      rows="3"
                      required
                      placeholder="Detail the issue: e.g. 'The generator is leaking fluid...'"
                      value={complaintText}
                      onChange={e => setComplaintText(e.target.value)}
                      class="w-full bg-[#060814] border border-indigo-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-indigo-500/50 focus:bg-[#090d19] transition-all"
                    />
                  </div>
                  <button type="submit" class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold text-xs rounded-xl transition-all shadow-md shadow-indigo-600/10">
                    Submit Incident Report
                  </button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 13. Supervisor Command Center Page
    function SupervisorPage({ issues, setIssues, maintenance, assets, users, logs, addSystemLog }) {

      const resolved = issues.filter(i => ['Resolved','Closed'].includes(i.status));

      const criticalCount = issues.filter(i => i.priority === 'Critical' && !['Resolved','Closed'].includes(i.status)).length;

      const techWorkload = techUsers.map(t => ({
        ...t,

      const assetHealth = [
        { label: 'Operational', count: assets.filter(a => a.status === 'Operational').length, color: 'text-emerald-400', bg: 'bg-emerald-500/10 border-emerald-500/20' },

                  <i data-lucide="users" class="w-4 h-4 text-amber-400"></i>
                  Team Workload
                </h4>
                {techWorkload.length === 0 ? (
                  <p class="text-xs text-amber-400/30">No technicians on team.</p>
                ) : (
                  <div class="space-y-3">
                    {techWorkload.map(t => {
                      const efficiency = t.done + t.open > 0 ? Math.round(t.done / (t.done + t.open) * 100) : 0;
                      return (
                        <div key={t.id} class="p-3 bg-[#060814]/50 border border-amber-500/08 rounded-xl">
                          <div class="flex items-center gap-3 mb-2">
                            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-amber-600 to-orange-500 flex items-center justify-center text-white font-black text-xs shadow-md">
                              {t.username.replace('tech_','').charAt(0).toUpperCase()}
                            </div>
                            <div class="flex-1">
                              <div class="text-xs font-bold text-white">{t.username}</div>
                              <div class="text-[10px] text-amber-400/50">Field Technician</div>
                            </div>
                            <div class="text-right">
                              <div class="text-[10px] font-black text-amber-400">{t.open} open</div>
                              <div class="text-[10px] text-emerald-400">{t.done} done</div>
                            </div>
                          </div>
                          {/* Efficiency bar */}
                          <div class="mt-1">
                            <div class="flex justify-between text-[10px] text-slate-500 mb-1">
                              <span>Efficiency</span>
                              <span class="text-amber-400 font-bold">{efficiency}%</span>
                            </div>
                            <div class="w-full h-1.5 rounded-full bg-slate-800/60">
                              <div
                                class="h-1.5 rounded-full bg-gradient-to-r from-amber-500 to-orange-400 transition-all"
                                style={{width: efficiency + '%'}}
                              ></div>
                            </div>
                          </div>
                          <div class="mt-2 text-[10px] text-slate-500">
                            Total billed: <span class="text-cyan-400 font-bold">${t.cost.toLocaleString()}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* Asset Fleet Health */}
              <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-6 glass-panel shadow-xl shadow-[#03050a]/40">
                <h4 class="text-sm font-bold text-white mb-4 flex items-center gap-2">
                  <i data-lucide="activity" class="w-4 h-4 text-indigo-400"></i>
                  Fleet Health
                </h4>
                <div class="space-y-2.5">
                  {assetHealth.map(item => (
                    <div key={item.label} class={`flex items-center justify-between px-3 py-2.5 rounded-xl border ${item.bg}`}>
                      <span class={`text-xs font-bold ${item.color}`}>{item.label}</span>
                      <span class={`text-lg font-black ${item.color}`}>{item.count}</span>
                    </div>
                  ))}
                </div>
                <div class="mt-4 pt-3 border-t border-indigo-500/10">
                  <div class="text-[10px] text-slate-500 mb-1">Fleet Operational Rate</div>
                  <div class="w-full h-2 rounded-full bg-slate-800/60">
                    <div
                      class="h-2 rounded-full bg-gradient-to-r from-emerald-500 to-teal-400"
                      style={{width: (assets.filter(a=>a.status==='Operational').length / Math.max(assets.length,1) * 100) + '%'}}
                    ></div>
                  </div>
                  <div class="text-xs font-black text-emerald-400 mt-1">
                    {Math.round(assets.filter(a=>a.status==='Operational').length / Math.max(assets.length,1) * 100)}% Online
                  </div>
                </div>
              </div>

              {/* Recent Audit */}
              <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-5 glass-panel shadow-xl shadow-[#03050a]/40">
                <h4 class="text-sm font-bold text-white mb-3 flex items-center gap-2">
                  <i data-lucide="scroll" class="w-4 h-4 text-indigo-400"></i>
                  Recent Activity
                </h4>
                <div class="space-y-2">
                  {logs.slice(0, 5).map((log, idx) => {
                    const asset = assets.find(a => a.id === log.asset_id);
                    return (
                      <div key={idx} class="flex gap-2 text-[10px]">
                        <div class="w-1.5 h-1.5 rounded-full bg-indigo-500 mt-1.5 shrink-0"></div>
                        <div>
                          <span class="font-bold text-white">{log.action}</span>
                          <span class="text-slate-500"> by {log.actor}</span>
                          {asset && <span class="text-indigo-400/50"> on {asset.name}</span>}
                          <div class="text-slate-600 font-mono">{new Date(log.timestamp).toLocaleDateString()}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>

          {/* Assign Modal */}
          {assignModal && (
            <div class="fixed inset-0 z-50 bg-slate-950/75 backdrop-blur-sm flex items-center justify-center p-4">
              <div class="bg-[#0d1326] border border-amber-500/20 rounded-2xl w-full max-w-md p-6 shadow-2xl shadow-[#03050a]/60 animate-slide-up">
                <div class="flex items-center justify-between mb-5">
                  <div>
                    <h3 class="text-md font-bold text-white">Assign Work Order</h3>
                    <p class="text-[10px] text-amber-400/60 mt-0.5">{assignModal.issue_number} — {assignModal.title}</p>
                  </div>
                  <button onClick={() => setAssignModal(null)} class="p-2 text-slate-500 hover:text-white rounded-xl hover:bg-[#121a32] transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                  </button>
                </div>
                <form onSubmit={handleAssign} class="space-y-4">
                  <div>
                    <label class="block text-[10px] font-bold text-amber-400/60 uppercase mb-1">Select Technician</label>
                    <select
                      value={assignTo}
                      onChange={e => setAssignTo(e.target.value)}
                      required
                      class="w-full bg-[#060814] border border-amber-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-amber-500/50 transition-all"
                    >
                      <option value="">— Choose technician —</option>
                      {techUsers.map(t => (
                        <option key={t.id} value={t.username}>{t.username} (open jobs: {issues.filter(i=>i.technician_id===t.id&&!['Resolved','Closed'].includes(i.status)).length})</option>
                      ))}
                    </select>
                  </div>
                  <div class="p-3 bg-amber-950/20 border border-amber-500/15 rounded-xl text-xs text-amber-400/70">
                    <strong class="text-amber-400">Issue Priority:</strong> {assignModal.priority} · Category: {assignModal.category}
                  </div>
                  <div class="flex gap-2">
                    <button type="button" onClick={() => setAssignModal(null)} class="flex-1 py-2 border border-slate-800 rounded-xl text-xs text-slate-400 bg-[#060814] hover:bg-[#121a32] transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 py-2 bg-amber-500 hover:bg-amber-400 text-slate-900 font-extrabold text-xs rounded-xl transition-all shadow-lg shadow-amber-500/20">
                      Confirm Assignment
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Approve Modal */}
          {approveModal && (
            <div class="fixed inset-0 z-50 bg-slate-950/75 backdrop-blur-sm flex items-center justify-center p-4">
              <div class="bg-[#0d1326] border border-emerald-500/20 rounded-2xl w-full max-w-sm p-6 shadow-2xl shadow-[#03050a]/60 animate-slide-up">
                <h3 class="text-md font-bold text-white mb-2">Approve Maintenance Cost</h3>
                <div class="p-4 bg-emerald-950/20 border border-emerald-500/15 rounded-xl text-xs text-slate-300 mb-4 space-y-1">
                  <div><span class="text-emerald-400 font-bold">Technician:</span> {approveModal.technician_name}</div>
                  <div><span class="text-emerald-400 font-bold">Notes:</span> {approveModal.notes}</div>
                  <div><span class="text-emerald-400 font-bold">Cost:</span> <span class="text-emerald-400 font-black text-sm">${approveModal.cost?.toLocaleString()}</span></div>
                </div>
                <div class="flex gap-2">
                  <button onClick={() => setApproveModal(null)} class="flex-1 py-2 border border-slate-800 rounded-xl text-xs text-slate-400 bg-[#060814] hover:bg-[#121a32] transition-colors">Cancel</button>
                  <button
                    onClick={() => { notify(`Cost of $${approveModal.cost?.toLocaleString()} approved!`, 'success'); setApproveModal(null); }}
                    class="flex-1 py-2 bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold text-xs rounded-xl transition-all shadow-lg shadow-emerald-600/20"
                  >
                    ✓ Approve
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 12. Main Dispatcher Page
    // 12. Technician Dashboard Page
    function TechnicianPage({ issues, setIssues, maintenance, setMaintenance, assets, users, activeRole, addSystemLog, searchQuery }) {
      const [activeTech, setActiveTech] = useState('tech_ali');
      const [showLogModal, setShowLogModal] = useState(false);
      const [selectedIssue, setSelectedIssue] = useState(null);
      const [newStatus, setNewStatus] = useState('');
      const [workNotes, setWorkNotes] = useState('');
      const [partsUsed, setPartsUsed] = useState('');
      const [workCost, setWorkCost] = useState('');
      const [evidenceFile, setEvidenceFile] = useState(null);
      const [uploadingEvidence, setUploadingEvidence] = useState(false);

      const techUsers = users.filter(u => u.role === 'Technician');
      const techUser = users.find(u => u.username === activeTech);

      // My assigned issues
      const myIssues = issues.filter(i => {
        const techObj = users.find(u => u.username === activeTech);
        return techObj && String(i.technician_id) === String(techObj.id);
      });

      // My completed maintenance
      const myMaintenance = maintenance.filter(m => m.technician_name === activeTech);

      const openIssues = myIssues.filter(i => !['Resolved','Closed'].includes(i.status));
      const closedIssues = myIssues.filter(i => ['Resolved','Closed'].includes(i.status));
      const totalCost = myMaintenance.reduce((s,m) => s + (m.cost || 0), 0);

      const handleOpenWork = (issue) => {
        setSelectedIssue(issue);
        setNewStatus(issue.status);
        setWorkNotes('');
        setPartsUsed('');
        setWorkCost('');
        setEvidenceFile(null);
        setShowLogModal(true);
      };

      const handleSubmitWork = async (e) => {
        e.preventDefault();
        if (!selectedIssue) return;
        const linkedAsset = assets.find(a => String(a.id) === String(selectedIssue.asset_id));

        let evidence_url = '';
        if (evidenceFile) {
          setUploadingEvidence(true);
          try {
            const fd = new FormData();
            fd.append('file', evidenceFile);
            const upRes = await apiFetch('/api/upload', { method: 'POST', body: fd });
            const upData = await upRes.json();
            if (upRes.ok) evidence_url = upData.url;
            else notify(`Evidence upload skipped: ${upData.error}`, 'warning');
          } catch (err) {
            notify('Evidence upload failed. Continuing without it.', 'warning');
          }
          setUploadingEvidence(false);
        }

        // Update issue status
        setIssues(prev => prev.map(i =>
          String(i.id) === String(selectedIssue.id) ? { ...i, status: newStatus, updated_at: new Date().toISOString() } : i
        ));

        // Log maintenance record if notes provided
        if (workNotes.trim()) {
          const record = {
            id: Date.now(),
            asset_id: selectedIssue.asset_id,
            issue_id: selectedIssue.id,
            notes: workNotes,
            parts_used: partsUsed,
            cost: Number(workCost) || 0,
            evidence_url,
            start_date: new Date().toISOString().split('T')[0],
            end_date: new Date().toISOString().split('T')[0],
            technician_name: activeTech,
            status: newStatus === 'Resolved' ? 'Completed' : 'In Progress'
          };
          setMaintenance(prev => [record, ...prev]);
        }

        addSystemLog(
          selectedIssue.asset_id,
          activeTech,
          'Work Update',
          `Technician ${activeTech} updated issue ${selectedIssue.issue_number} to "${newStatus}". ${workNotes ? 'Notes: ' + workNotes.substring(0,60) : ''}`
        );

        notify(`Work order ${selectedIssue.issue_number} updated to "${newStatus}"!`, 'success');
        setShowLogModal(false);
        setSelectedIssue(null);
      };

      const statusColor = (s) => {
        if (s === 'Resolved' || s === 'Closed') return 'bg-emerald-950/40 border-emerald-500/20 text-emerald-400';
        if (s === 'Maintenance In Progress') return 'bg-indigo-950/40 border-indigo-500/20 text-indigo-400';
        if (s === 'Inspection Started') return 'bg-cyan-950/40 border-cyan-500/20 text-cyan-400';
        if (s === 'Assigned') return 'bg-amber-950/40 border-amber-500/20 text-amber-400';
        return 'bg-slate-900/40 border-slate-700/30 text-slate-400';
      };

      const priorityColor = (p) => {
        if (p === 'Critical') return 'bg-red-950/40 border-red-500/20 text-red-400';
        if (p === 'High') return 'bg-amber-950/40 border-amber-500/20 text-amber-400';
        return 'bg-indigo-950/40 border-indigo-500/20 text-indigo-400';
      };

      return (
        <div class="space-y-6">
          {/* Header */}
          <div class="flex justify-between items-start">
            <div>
              <h2 class="text-2xl font-bold text-white tracking-tight">Technician Workshop</h2>
              <p class="text-xs text-indigo-400/70 mt-1">Manage assigned work orders, log field service notes, and track completion.</p>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-[10px] font-bold text-indigo-400/50 uppercase tracking-wider">Active Tech:</span>
              <select
                value={activeTech}
                onChange={e => setActiveTech(e.target.value)}
                class="bg-[#060814] border border-indigo-500/20 rounded-xl px-3 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-indigo-500/50 transition-all"
              >
                {techUsers.map(t => (
                  <option key={t.id} value={t.username}>{t.username}</option>
                ))}
              </select>
            </div>
          </div>

          {/* Stats Row */}
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-5 glass-panel hover-glow transition-all">
              <span class="block text-indigo-400/50 text-[10px] uppercase font-bold mb-1">Open Work Orders</span>
              <h3 class="text-3xl font-black text-amber-400">{openIssues.length}</h3>
              <p class="text-[10px] text-slate-500 mt-1">Pending resolution</p>
            </div>
            <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-5 glass-panel hover-glow transition-all">
              <span class="block text-indigo-400/50 text-[10px] uppercase font-bold mb-1">Completed Jobs</span>
              <h3 class="text-3xl font-black text-emerald-400">{closedIssues.length + myMaintenance.filter(m=>m.status==='Completed').length}</h3>
              <p class="text-[10px] text-slate-500 mt-1">This cycle</p>
            </div>
            <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-5 glass-panel hover-glow transition-all">
              <span class="block text-indigo-400/50 text-[10px] uppercase font-bold mb-1">Service Records</span>
              <h3 class="text-3xl font-black text-indigo-400">{myMaintenance.length}</h3>
              <p class="text-[10px] text-slate-500 mt-1">Maintenance logs filed</p>
            </div>
            <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-5 glass-panel hover-glow transition-all">
              <span class="block text-indigo-400/50 text-[10px] uppercase font-bold mb-1">Total Labor Cost</span>
              <h3 class="text-3xl font-black text-cyan-400">${totalCost.toLocaleString()}</h3>
              <p class="text-[10px] text-slate-500 mt-1">Parts & labour</p>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* Active Work Orders */}
            <div class="lg:col-span-2 space-y-4">
              <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-6 glass-panel shadow-xl shadow-[#03050a]/40">
                <div class="flex items-center justify-between mb-5">
                  <h4 class="text-sm font-bold text-white">Active Work Orders</h4>
                  <span class="text-[10px] font-bold text-amber-400 bg-amber-950/30 border border-amber-500/20 px-2 py-0.5 rounded-full">
                    {openIssues.length} pending
                  </span>
                </div>

                {openIssues.length === 0 ? (
                  <div class="text-center py-10">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-950/40 border border-emerald-500/20 flex items-center justify-center mx-auto mb-3">
                      <i data-lucide="check-circle" class="w-6 h-6 text-emerald-400"></i>
                    </div>
                    <p class="text-sm font-bold text-emerald-400">All Clear!</p>
                    <p class="text-xs text-slate-500 mt-1">No active work orders assigned.</p>
                  </div>
                ) : (
                  <div class="space-y-3">
                    {openIssues.map(issue => {
                      const linkedAsset = assets.find(a => a.id === issue.asset_id);
                      return (
                        <div key={issue.id} class="p-4 bg-[#060814]/60 border border-indigo-500/10 rounded-xl hover:border-indigo-500/25 transition-all group">
                          <div class="flex items-start justify-between gap-3">
                            <div class="flex-1 min-w-0">
                              <div class="flex items-center gap-2 flex-wrap">
                                <span class="font-mono text-[10px] font-bold text-indigo-400">{issue.issue_number}</span>
                                <span class={`text-[10px] font-bold px-2 py-0.5 rounded border ${priorityColor(issue.priority)}`}>
                                  {issue.priority}
                                </span>
                                <span class={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${statusColor(issue.status)}`}>
                                  {issue.status}
                                </span>
                              </div>
                              <p class="text-sm font-bold text-white mt-1.5 truncate">{issue.title}</p>
                              {linkedAsset && (
                                <p class="text-[10px] text-indigo-400/50 mt-0.5">
                                  <i data-lucide="package" class="w-3 h-3 inline-block mr-1"></i>
                                  {linkedAsset.name} — {linkedAsset.location}
                                </p>
                              )}
                              <p class="text-xs text-slate-400 mt-1 line-clamp-2">{issue.description}</p>
                            </div>
                            <button
                              onClick={() => handleOpenWork(issue)}
                              class="shrink-0 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-[10px] rounded-lg transition-all shadow-md shadow-indigo-600/20 opacity-80 group-hover:opacity-100"
                            >
                              Update Work
                            </button>
                          </div>

                          {/* AI Diagnostic Hints */}
                          {issue.ai_used === 1 && issue.ai_diagnostic_checks && (() => {
                            try {
                              const checks = JSON.parse(issue.ai_diagnostic_checks);
                              return (
                                <div class="mt-3 p-3 bg-indigo-950/30 border border-indigo-500/15 rounded-xl">
                                  <p class="text-[10px] font-bold text-indigo-400 mb-1.5 flex items-center gap-1">
                                    <i data-lucide="cpu" class="w-3 h-3"></i> AI Diagnostic Checklist
                                  </p>
                                  <ul class="space-y-0.5">
                                    {checks.slice(0,3).map((c,idx) => (
                                      <li key={idx} class="text-[10px] text-slate-400 flex items-center gap-1.5">
                                        <span class="w-1 h-1 rounded-full bg-indigo-500 shrink-0"></span>{c}
                                      </li>
                                    ))}
                                  </ul>
                                </div>
                              );
                            } catch(e) { return null; }
                          })()}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* Maintenance History */}
              <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-6 glass-panel shadow-xl shadow-[#03050a]/40">
                <h4 class="text-sm font-bold text-white mb-4">My Maintenance History</h4>
                {myMaintenance.length === 0 ? (
                  <p class="text-xs text-indigo-400/40 py-2">No maintenance records logged yet.</p>
                ) : (
                  <div class="space-y-3">
                    {myMaintenance.map(m => {
                      const linkedAsset = assets.find(a => a.id === m.asset_id);
                      return (
                        <div key={m.id} class="p-4 bg-[#060814]/50 border border-indigo-500/10 rounded-xl text-xs">
                          <div class="flex justify-between items-start">
                            <div class="flex-1">
                              <div class="font-bold text-white">{linkedAsset ? linkedAsset.name : 'Unknown Asset'}</div>
                              <div class="text-slate-400 mt-1">{m.notes}</div>
                              {m.parts_used && (
                                <div class="text-indigo-400/60 mt-1 text-[10px]">
                                  <i data-lucide="tool" class="w-3 h-3 inline-block mr-1"></i>Parts: {m.parts_used}
                                </div>
                              )}
                            </div>
                            <div class="text-right shrink-0 ml-3">
                              <div class="font-mono font-bold text-emerald-400 text-sm">${m.cost.toLocaleString()}</div>
                              <div class="text-[10px] text-indigo-400/40 mt-1 font-mono">{m.end_date}</div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>

            {/* Right Column: Profile + Resolved */}
            <div class="space-y-4">
              {/* Tech Profile Card */}
              <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-6 glass-panel shadow-xl shadow-[#03050a]/40">
                <div class="flex flex-col items-center text-center">
                  <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-600 to-cyan-500 flex items-center justify-center text-2xl font-black text-white shadow-lg shadow-indigo-500/30 mb-3">
                    {activeTech.replace('tech_', '').charAt(0).toUpperCase()}
                  </div>
                  <h3 class="font-bold text-white text-sm">{activeTech}</h3>
                  <span class="text-[10px] mt-1 bg-cyan-950/40 text-cyan-400 border border-cyan-500/20 px-2 py-0.5 rounded-full font-bold">Field Technician</span>
                </div>
                <div class="mt-4 space-y-2">
                  <div class="flex justify-between text-xs py-2 border-b border-indigo-500/10">
                    <span class="text-indigo-400/50 font-bold">Open Jobs</span>
                    <span class="text-amber-400 font-bold">{openIssues.length}</span>
                  </div>
                  <div class="flex justify-between text-xs py-2 border-b border-indigo-500/10">
                    <span class="text-indigo-400/50 font-bold">Completed</span>
                    <span class="text-emerald-400 font-bold">{closedIssues.length}</span>
                  </div>
                  <div class="flex justify-between text-xs py-2">
                    <span class="text-indigo-400/50 font-bold">Total Billed</span>
                    <span class="text-cyan-400 font-bold">${totalCost.toLocaleString()}</span>
                  </div>
                </div>
              </div>

              {/* Completed Jobs */}
              <div class="bg-[#0d1326]/60 border border-indigo-500/12 rounded-2xl p-5 glass-panel shadow-xl shadow-[#03050a]/40">
                <h4 class="text-sm font-bold text-white mb-4">Resolved Work Orders</h4>
                {closedIssues.length === 0 ? (
                  <p class="text-xs text-indigo-400/40 py-2">No resolved issues yet.</p>
                ) : (
                  <div class="space-y-2">
                    {closedIssues.map(issue => (

                      onChange={e => setWorkNotes(e.target.value)}
                      class="w-full bg-[#060814] border border-indigo-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 placeholder-indigo-400/20 focus:outline-none focus:border-indigo-500/50 focus:bg-[#090d19] transition-all"

                  <div class="grid grid-cols-2 gap-3">
                    <div>
                      <label class="block text-[10px] font-bold text-indigo-400/60 uppercase mb-1">Parts Used</label>

                        placeholder="e.g. Gasket set x2"

                        onChange={e => setPartsUsed(e.target.value)}
                        class="w-full bg-[#060814] border border-indigo-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 placeholder-indigo-400/20 focus:outline-none focus:border-indigo-500/50 focus:bg-[#090d19] transition-all"
                      />
                    </div>
                    <div>
                      <label class="block text-[10px] font-bold text-indigo-400/60 uppercase mb-1">Labor Cost ($)</label>
                      <input
                        type="number"
                        placeholder="0"
                        value={workCost}
                        onChange={e => setWorkCost(e.target.value)}
                        class="w-full bg-[#060814] border border-indigo-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 placeholder-indigo-400/20 focus:outline-none focus:border-indigo-500/50 focus:bg-[#090d19] transition-all"
                      />

                  <div>
                    <label class="block text-[10px] font-bold text-indigo-400/60 uppercase mb-1">Evidence Photo/Video (optional)</label>

                      type="file"

                      onChange={e => setEvidenceFile(e.target.files[0] || null)}
                      class="w-full bg-[#060814] border border-indigo-500/15 rounded-xl px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-indigo-500/50 transition-all"
                    />
                  </div>

                  <div class="flex justify-end gap-2 pt-1">
                    <button type="button" onClick={() => setShowLogModal(false)} class="px-4 py-2 border border-indigo-500/15 rounded-xl text-xs text-indigo-400 hover:bg-[#121a32] bg-[#060814] transition-colors">
                      Cancel
                    </button>
                    <button type="submit" disabled={uploadingEvidence} class="px-4 py-2 bg-indigo-600 disabled:opacity-50 rounded-xl text-xs font-bold text-white hover:bg-indigo-500 transition-colors shadow-lg shadow-indigo-600/20">
                      {uploadingEvidence ? 'Uploading...' : 'Submit Work Log'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    function PageComponent({
      activeTab, setActiveTab,
      assets, setAssets,
      issues, setIssues,
      maintenance, setMaintenance,
      logs, setLogs,
      users, setUsers,
      stats, searchQuery,
      inspectedAsset, setInspectedAsset,
      addSystemLog, activeRole,
      handleInspectAsset
    }) {
      
      useEffect(() => {
        lucide.createIcons();
      }, [activeTab]);

      const renderTabContent = () => {
        const isTech = activeRole === 'Technician';
        const isSuper = activeRole === 'Supervisor';

        if (isTech) {
          // Technicians only have access to 'technician' and 'preview-public'
          if (activeTab !== 'technician' && activeTab !== 'preview-public') {
            return <TechnicianPage issues={issues} setIssues={setIssues} maintenance={maintenance} setMaintenance={setMaintenance} assets={assets} users={users} activeRole={activeRole} addSystemLog={addSystemLog} searchQuery={searchQuery} />;
          }
        } else if (isSuper) {
          // Supervisors have access to supervisor, issues, maintenance, assets, asset-details, analytics, history, preview-public
          const allowed = ['supervisor', 'issues', 'maintenance', 'assets', 'asset-details', 'analytics', 'history', 'preview-public'];
          if (!allowed.includes(activeTab)) {
            return <SupervisorPage issues={issues} setIssues={setIssues} maintenance={maintenance} assets={assets} users={users} logs={logs} addSystemLog={addSystemLog} />;
          }
        }

        switch (activeTab) {
          case 'dashboard':
            return <DashboardPage stats={stats} logs={logs} assets={assets} setActiveTab={setActiveTab} />;
          case 'assets':
            return <AssetsPage assets={assets} setAssets={setAssets} searchQuery={searchQuery} handleInspectAsset={handleInspectAsset} activeRole={activeRole} addSystemLog={addSystemLog} />;
          case 'asset-details':
            return <AssetDetailsPage inspectedAsset={inspectedAsset} issues={issues} maintenance={maintenance} activeRole={activeRole} setActiveTab={setActiveTab} />;
          case 'issues':
            return <IssuesPage issues={issues} setIssues={setIssues} assets={assets} setAssets={setAssets} users={users} searchQuery={searchQuery} activeRole={activeRole} addSystemLog={addSystemLog} />;
          case 'maintenance':
            return <MaintenancePage maintenance={maintenance} setMaintenance={setMaintenance} assets={assets} setAssets={setAssets} users={users} searchQuery={searchQuery} activeRole={activeRole} addSystemLog={addSystemLog} />;
          case 'qr':
            return <QrCodesPage assets={assets} />;
          case 'analytics':
            return <AnalyticsPage />;
          case 'history':
            return <HistoryPage logs={logs} searchQuery={searchQuery} />;
          case 'users':
            return <UsersPage users={users} setUsers={setUsers} activeRole={activeRole} searchQuery={searchQuery} />;
          case 'settings':
            return <SettingsPage />;
          case 'technician':
            return <TechnicianPage issues={issues} setIssues={setIssues} maintenance={maintenance} setMaintenance={setMaintenance} assets={assets} users={users} activeRole={activeRole} addSystemLog={addSystemLog} searchQuery={searchQuery} />;
          case 'supervisor':
            return <SupervisorPage issues={issues} setIssues={setIssues} maintenance={maintenance} assets={assets} users={users} logs={logs} addSystemLog={addSystemLog} />;
          case 'preview-public':
            return <PublicScannerPage assets={assets} setAssets={setAssets} issues={issues} setIssues={setIssues} addSystemLog={addSystemLog} />;
          default:
            return <DashboardPage stats={stats} logs={logs} assets={assets} setActiveTab={setActiveTab} />;
        }
      };

      return (
        <div key={activeTab} class="animate-slide-up">
          {renderTabContent()}
        </div>
      );
    }

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    const API_BASE = window.location.port === '8000' ? 'http://localhost:5000' : '';

    // ── Attach the logged-in JWT to every backend call, and bounce to login on 401 ──
    function authHeaders() {
      try {
        const saved = JSON.parse(localStorage.getItem('maintainiq_auth') || 'null');
        return saved && saved.token ? { Authorization: `Bearer ${saved.token}` } : {};
      } catch {
        return {};
      }
    }
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: { ...(options.headers || {}), ...authHeaders() },
      });
      if (res.status === 401) {
        localStorage.removeItem('maintainiq_auth');
        localStorage.removeItem('maintainiq_active_role');
        window.location.replace('../auth.html');
        throw new Error('Session expired. Redirecting to login.');
      }
      return res;
    }

    function App() {
      const [assets, setAssetsState] = useState([]);
      const [issues, setIssuesState] = useState([]);
      const [maintenance, setMaintenanceState] = useState([]);
      const [logs, setLogsState] = useState([]);
      const [users, setUsersState] = useState([]);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [searchQuery, setSearchQuery] = useState('');
      const [inspectedAsset, setInspectedAsset] = useState(null);
      const [toasts, setToasts] = useState([]);
      const [activeRole, setActiveRole] = useState(() => {
        // Read role from auth guard
        const authUser = window.__AUTH_USER__;
        if (authUser && authUser.role) return authUser.role;
        return localStorage.getItem('maintainiq_active_role') || 'Admin';
      });
      const [currentUser, setCurrentUser] = useState(() => window.__AUTH_USER__ || null);
      const [isBackendConnected, setIsBackendConnected] = useState(false);

      const refreshData = async () => {
        try {
          const resA = await apiFetch('/api/assets');
          if (!resA.ok) throw new Error('API server down');
          const dataA = await resA.json();
          setAssetsState(dataA);

          const resI = await apiFetch('/api/issues');
          const dataI = await resI.json();
          setIssuesState(dataI);

          const resM = await apiFetch('/api/maintenance');
          const dataM = await resM.json();
          setMaintenanceState(dataM);

          const resL = await apiFetch('/api/logs');
          const dataL = await resL.json();
          setLogsState(dataL);

          const resU = await apiFetch('/api/users');
          const dataU = await resU.json();
          setUsersState(dataU);

          setIsBackendConnected(true);
        } catch (e) {
          console.warn("Backend down or MongoDB disconnected. Falling back to local state.", e);
          setIsBackendConnected(false);
          
          // Local fallback initialization
          const localAssets = localStorage.getItem('maintainiq_assets');
          setAssetsState(localAssets ? JSON.parse(localAssets) : DEFAULT_ASSETS);
          const localIssues = localStorage.getItem('maintainiq_issues');
          setIssuesState(localIssues ? JSON.parse(localIssues) : DEFAULT_ISSUES);
          const localMaint = localStorage.getItem('maintainiq_maint');
          setMaintenanceState(localMaint ? JSON.parse(localMaint) : DEFAULT_MAINTENANCE);
          const localLogs = localStorage.getItem('maintainiq_logs');
          setLogsState(localLogs ? JSON.parse(localLogs) : DEFAULT_LOGS);
          const localUsers = localStorage.getItem('maintainiq_users');
          setUsersState(localUsers ? JSON.parse(localUsers) : DEFAULT_USERS);
        }
      };

      useEffect(() => {
        refreshData();
      }, []);

      // If backend is down, we sync fallback state to localStorage
      useEffect(() => {
        if (!isBackendConnected && assets.length > 0) {
          localStorage.setItem('maintainiq_assets', JSON.stringify(assets));
        }
      }, [assets, isBackendConnected]);
      useEffect(() => {
        if (!isBackendConnected && issues.length > 0) {
          localStorage.setItem('maintainiq_issues', JSON.stringify(issues));
        }
      }, [issues, isBackendConnected]);
      useEffect(() => {
        if (!isBackendConnected && maintenance.length > 0) {
          localStorage.setItem('maintainiq_maint', JSON.stringify(maintenance));
        }
      }, [maintenance, isBackendConnected]);
      useEffect(() => {
        if (!isBackendConnected && logs.length > 0) {
          localStorage.setItem('maintainiq_logs', JSON.stringify(logs));
        }
      }, [logs, isBackendConnected]);
      useEffect(() => {
        if (!isBackendConnected && users.length > 0) {
          localStorage.setItem('maintainiq_users', JSON.stringify(users));
        }
      }, [users, isBackendConnected]);

      // State setter wrappers to auto-post updates to MongoDB backend
      const setAssets = async (action) => {
        const nextVal = typeof action === 'function' ? action(assets) : action;
        if (!isBackendConnected) {
          setAssetsState(nextVal);
          return;
        }
        
        try {
          if (nextVal.length > assets.length) {
            const added = nextVal.find(x => !assets.some(y => String(y.id) === String(x.id)));
            if (added) {
              await apiFetch('/api/assets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...added, actor: activeRole })
              });
            }
          } else if (nextVal.length < assets.length) {
            const deleted = assets.find(x => !nextVal.some(y => String(y.id) === String(x.id)));
            if (deleted) {
              await apiFetch(`/api/assets/${deleted.id}`, {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ actor: activeRole })
              });
            }
          } else {
            for (let fresh of nextVal) {
              const old = assets.find(x => String(x.id) === String(fresh.id));
              if (old && JSON.stringify(fresh) !== JSON.stringify(old)) {
                await apiFetch(`/api/assets/${fresh.id}`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ ...fresh, actor: activeRole })
                });
              }
            }
          }
        } catch (err) {
          console.error("API error mutating assets:", err);
        }
        refreshData();
      };

      const setIssues = async (action) => {
        const nextVal = typeof action === 'function' ? action(issues) : action;
        if (!isBackendConnected) {
          setIssuesState(nextVal);
          return;
        }

        try {
          if (nextVal.length > issues.length) {
            const added = nextVal.find(x => !issues.some(y => String(y.id) === String(x.id)));
            if (added) {
              await apiFetch('/api/issues', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(added)
              });
            }
          } else {
            for (let fresh of nextVal) {
              const old = issues.find(x => String(x.id) === String(fresh.id));
              if (old && JSON.stringify(fresh) !== JSON.stringify(old)) {
                await apiFetch(`/api/issues/${fresh.id}`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ ...fresh, actor: activeRole })
                });
              }
            }
          }
        } catch (err) {
          console.error("API error mutating issues:", err);
        }
        refreshData();
      };

      const setMaintenance = async (action) => {
        const nextVal = typeof action === 'function' ? action(maintenance) : action;
        if (!isBackendConnected) {
          setMaintenanceState(nextVal);
          return;
        }

        try {
          if (nextVal.length > maintenance.length) {
            const added = nextVal.find(x => !maintenance.some(y => String(y.id) === String(x.id)));
            if (added) {
              await apiFetch('/api/maintenance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(added)
              });
            }
          }
        } catch (err) {
          console.error("API error mutating maintenance:", err);
        }
        refreshData();
      };

      const setUsers = async (action) => {
        const nextVal = typeof action === 'function' ? action(users) : action;
        if (!isBackendConnected) {
          setUsersState(nextVal);
          return;
        }

        try {
          if (nextVal.length > users.length) {
            const added = nextVal.find(x => !users.some(y => String(y.id) === String(x.id)));
            if (added) {
              await apiFetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(added)
              });
            }
          }
        } catch (err) {
          console.error("API error mutating users:", err);
        }
        refreshData();
      };

      useEffect(() => {
        const addToast = (message, type) => {
          const id = Date.now();
          setToasts(prev => [...prev, { id, message, type }]);
          setTimeout(() => {
            setToasts(prev => prev.filter(t => t.id !== id));
          }, 4000);
        };
        toastListeners.push(addToast);
        return () => {
          toastListeners = toastListeners.filter(l => l !== addToast);
        };
      }, []);

      const resetAllData = async () => {
        if(confirm('Are you sure you want to reset all MongoDB and local databases back to default hackathon settings?')) {
          if (isBackendConnected) {
            try {
              const res = await apiFetch('/api/health/reset', { method: 'POST' });
              if (res.ok) {
                notify('MongoDB databases reset successfully!', 'success');
              } else {
                throw new Error('Server reset failed');
              }
            } catch (err) {
              notify('Server reset failed. Cleaning local state instead.', 'warning');
            }
          }
          
          localStorage.setItem('maintainiq_assets', JSON.stringify(DEFAULT_ASSETS));
          localStorage.setItem('maintainiq_issues', JSON.stringify(DEFAULT_ISSUES));
          localStorage.setItem('maintainiq_maint', JSON.stringify(DEFAULT_MAINTENANCE));
          localStorage.setItem('maintainiq_logs', JSON.stringify(DEFAULT_LOGS));
          localStorage.setItem('maintainiq_users', JSON.stringify(DEFAULT_USERS));
          
          refreshData();
          notify('System databases reset successfully!', 'success');
        }
      };

      const addSystemLog = async (assetId, actor, action, details) => {
        if (isBackendConnected) {
          try {
            await apiFetch('/api/logs', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ asset_id: assetId || null, actor, action, details })
            });
            refreshData();
          } catch (e) {
            console.error(e);
          }
        } else {
          const newLog = {
            id: Date.now(),
            asset_id: assetId,
            timestamp: new Date().toISOString(),
            actor: actor,
            action: action,
            details: details
          };
          setLogsState(prev => [newLog, ...prev]);
        }
      };

      const handleInspectAsset = (asset) => {
        setInspectedAsset(asset);
        setActiveTab('asset-details');
      };

      const stats = {
        totalAssets: assets.length,
        activeIssues: issues.filter(i => i.status !== 'Resolved' && i.status !== 'Closed').length,
        pendingMaint: issues.filter(i => ['Assigned', 'Inspection Started', 'Maintenance In Progress'].includes(i.status)).length,
        operationalRate: parseFloat((assets.filter(a => a.status === 'Operational').length / assets.length * 100).toFixed(1)) || 0,
      };

      // Auto-redirect when role changes
      useEffect(() => {
        if (activeRole === 'Technician') {
          setActiveTab('technician');
        } else if (activeRole === 'Supervisor') {
          setActiveTab('supervisor');
        } else {
          if (['technician','supervisor'].includes(activeTab)) setActiveTab('dashboard');
        }
      }, [activeRole]);

      const isTechRole = activeRole === 'Technician';
      const isSupervisorRole = activeRole === 'Supervisor';

      return (
        <div class="flex h-screen overflow-hidden">
          {/* TOAST CONTAINER */}
          <div class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2 pointer-events-none">
            {toasts.map(t => (
              <div key={t.id} class={`pointer-events-auto px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 border min-w-[280px] text-sm ${
                t.type === 'success' ? 'bg-emerald-950/80 border-emerald-500/35 text-emerald-300' :
                t.type === 'warning' ? 'bg-amber-950/80 border-amber-500/35 text-amber-300' :

                <span class="font-semibold">{t.message}</span>
              </div>
            ))}

          {/* ============================================================ */}
          {/* ROLE-BASED SIDEBARS                                           */}
          {/* ============================================================ */}

            <aside class="w-64 bg-[#060f1a]/95 border border-cyan-500/15 flex flex-col shrink-0 m-4 mr-0 rounded-3xl shadow-2xl shadow-[#03050a]/60 backdrop-blur-md">
              {/* Logo */}
              <div class="p-6 border-b border-cyan-500/15 flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-cyan-500 to-teal-400 flex items-center justify-center text-white shadow-md shadow-cyan-500/30">
                  <i data-lucide="hard-hat" class="w-5 h-5"></i>
                </div>
                <div>
                  <h1 class="font-extrabold text-md tracking-tight text-white">
                    Maintain<span class="text-cyan-400 font-black">IQ</span>
                  </h1>
                  <p class="text-[10px] text-cyan-400/60 font-semibold tracking-wider uppercase">Technician Portal</p>
                </div>
              </div>

              {/* Role Badge */}
              <div class="mx-4 mt-4 p-3 bg-cyan-950/30 border border-cyan-500/20 rounded-xl flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-cyan-600 to-teal-500 flex items-center justify-center text-white font-black text-sm shadow-md">
                  T
                </div>
                <div>
                  <div class="text-xs font-bold text-white">Field Technician</div>
                  <div class="text-[10px] text-cyan-400/60 font-semibold">Active Session</div>
                </div>
                <div class="ml-auto w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></div>
              </div>

              {/* Tech Nav */}
              <nav class="flex-1 px-4 py-4 space-y-1.5 overflow-y-auto">
                <p class="px-3 text-[10px] font-bold text-cyan-400/40 tracking-widest uppercase mb-2">My Workspace</p>

                <button onClick={() => setActiveTab('technician')} class={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${
                  activeTab === 'technician' ? 'bg-cyan-600/15 border border-cyan-500/30 text-cyan-400 font-semibold' : 'text-slate-400 hover:bg-slate-800/40 hover:text-slate-200'
                }`}>
                  <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                  My Dashboard
                  {issues.filter(i => !['Resolved','Closed'].includes(i.status) && i.technician_id !== null).length > 0 && (
                    <span class="ml-auto bg-cyan-500 text-slate-900 text-[10px] font-extrabold px-1.5 py-0.5 rounded-full">
                      {issues.filter(i => !['Resolved','Closed'].includes(i.status) && i.technician_id !== null).length}
                    </span>
                  )}
                </button>

                <button onClick={() => setActiveTab('maintenance')} class={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${
                  activeTab === 'maintenance' ? 'bg-cyan-600/15 border border-cyan-500/30 text-cyan-400 font-semibold' : 'text-slate-400 hover:bg-slate-800/40 hover:text-slate-200'
                }`}>
                  <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                  My Service Logs
