name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci || npm install

      - name: Syntax-check all backend source files
        working-directory: backend
        run: find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node -c

      - name: Build Docker image
        run: docker build -t maintainiq-backend:ci .
